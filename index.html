<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Ocean - Audio Quest UI</title>
    <style>
        /* --- HOLOGRAPHIC HUD UI STYLES --- */
        :root {
            --bg-dark: #070B19;
            --hud-blue: #00E5FF;
            --hud-orange: #FF8C00;
            --panel-bg: rgba(10, 25, 47, 0.85);
            --text-light: #E6F1FF;
            --btn-bg: rgba(0, 229, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #112240 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-container {
            background: var(--panel-bg);
            border: 2px solid var(--hud-blue);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2), inset 0 0 15px rgba(0, 229, 255, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        /* Decorative HUD corners */
        .hud-container::before, .hud-container::after {
            content: ''; position: absolute; width: 30px; height: 30px;
            border: 3px solid var(--hud-orange); border-radius: 5px;
        }
        .hud-container::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .hud-container::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        h1 { color: var(--hud-orange); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        
        /* Active Verse Display */
        .active-display {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--hud-orange);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            min-height: 80px;
        }
        
        #verse-title { color: var(--hud-blue); margin: 0 0 10px 0; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        .script-text { font-size: 1.1rem; font-weight: bold; line-height: 1.5; color: #fff;}
        .kannada-text { color: #A8DADC; font-size: 0.95rem; margin-top: 5px;}

        /* Global Controls */
        .main-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        
        button { cursor: pointer; border: none; outline: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; border-radius: 5px;}
        
        .btn-global { background: transparent; color: var(--hud-orange); border: 2px solid var(--hud-orange); padding: 12px 20px; font-size: 0.9rem; }
        .btn-global:hover { background: var(--hud-orange); color: var(--bg-dark); box-shadow: 0 0 15px rgba(255, 140, 0, 0.6); }

        /* Level Grid */
        h3 { color: #64FFDA; font-size: 1rem; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid rgba(100, 255, 218, 0.3); padding-bottom: 5px;}
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        .level-grid::-webkit-scrollbar { width: 6px; }
        .level-grid::-webkit-scrollbar-thumb { background: var(--hud-blue); border-radius: 3px; }

        .btn-level {
            background: var(--btn-bg);
            color: var(--hud-blue);
            border: 1px solid var(--hud-blue);
            padding: 15px 0;
            font-size: 1.1rem;
            border-radius: 8px;
        }
        
        .btn-level:hover { background: rgba(0, 229, 255, 0.3); box-shadow: 0 0 10px rgba(0, 229, 255, 0.5); transform: scale(1.05); }
        .btn-level.active { background: var(--hud-blue); color: var(--bg-dark); box-shadow: 0 0 15px rgba(0, 229, 255, 0.8); }

        .status { margin-top: 20px; font-size: 0.8rem; color: #A8DADC; }
        .status-note { margin-top: 10px; margin-bottom: 10px; font-size: 0.8rem; color: #FF3e3a; }

    </style>
</head>

        const audioPlayer = document.getElementById('master-audio');

        const hindiEl = document.getElementById('text-hindi');
        const kannadaEl = document.getElementById('text-kannada');
        const statusText = document.getElementById('status-text');
        
        let currentTargetEnd = null; // Tells the player when to pause
        let isSegmentPlaying = false;

        // --- 3. GENERATE THE GRID UI ---
        function buildGrid() {
            verseDatabase.forEach(verse => {
                const btn = document.createElement('button');
                btn.className = 'btn-level';
                btn.innerText = verse.label;
                btn.onclick = () => playSegment(verse, btn);
                gridContainer.appendChild(btn);
            });
        }

        // --- 4. PLAY SPECIFIC SEGMENT LOGIC ---
        function playSegment(verse, clickedBtn) {
            // Update UI Styling
            document.querySelectorAll('.btn-level').forEach(b => b.classList.remove('active'));
            if(clickedBtn) clickedBtn.classList.add('active');

            // Update Text Display
            titleEl.innerText = verse.title;
            hindiEl.innerText = verse.hindi;
            kannadaEl.innerText = verse.kannada;
            statusText.innerText = `TRANSMITTING LOG: ${verse.label}`;

            // Set Audio Timestamps and Play
            audioPlayer.currentTime = verse.start;
            currentTargetEnd = verse.end;
            isSegmentPlaying = true;
            
            audioPlayer.play().catch(e => {
                statusText.innerText = "ERROR: Please check audio file connection.";
            });
        }

        // --- 5. AUTO-STOP AT END OF SEGMENT ---
        // This constantly checks the time to see if the segment is finished
        audioPlayer.addEventListener('timeupdate', () => {
            if (isSegmentPlaying && currentTargetEnd !== null) {
                if (audioPlayer.currentTime >= currentTargetEnd) {
                    audioPlayer.pause();
                    isSegmentPlaying = false; // Stop tracking so they don't get stuck
                    currentTargetEnd = null;
                    statusText.innerText = "TRANSMISSION COMPLETE";
                    document.querySelectorAll('.btn-level').forEach(b => b.classList.remove('active'));
                }
            }
        });

        // --- 6. GLOBAL CONTROLS ---
        document.getElementById('btn-play-all').onclick = () => {
            isSegmentPlaying = false; // Disable auto-stop
            currentTargetEnd = null;
            document.querySelectorAll('.btn-level').forEach(b => b.classList.remove('active'));
            titleEl.innerText = "Full Master Track";
            hindiEl.innerText = "Playing all verses...";
            kannadaEl.innerText = "";
            audioPlayer.currentTime = 0;
            audioPlayer.play();
            statusText.innerText = "PLAYING ENTIRE LOG";
        };

        document.getElementById('btn-stop').onclick = () => {
            audioPlayer.pause();
            isSegmentPlaying = false;
            statusText.innerText = "AUDIO HALTED";
            document.querySelectorAll('.btn-level').forEach(b => b.classList.remove('active'));
        };

        // Initialize App
        buildGrid();

    </script>
